</style></head><body><canvas id="c"></canvas><section id="hud"><div class="row top"><span class="pill"><b>Core</b> Hades / Stygian Blade</span><span class="pill"><b>Square</b> Strike/Chop/Thrust</span><span class="pill"><b>Triangle</b> Nova Smash</span><span class="pill"><b>Circle</b> Shuffle</span></div><div class="bars"><div class="barline"><span>HP</span><div class="bar"><i id="hp"></i></div><b id="hpt"></b></div><div class="barline"><span>Mana</span><div class="bar"><i id="mp"></i></div><b id="mpt"></b></div><div class="barline"><span>Shuffle</span><div class="bar"><i id="sh"></i></div><b id="sht"></b></div></div><div class="tray"><article class="card" id="l"><div class="slot">LB</div><h2></h2><p></p><small></small></article><article class="card" id="r"><div class="slot">RB</div><h2></h2><p></p><small></small></article></div><div class="row"><span class="pill keys"><b>Keyboard</b> WASD move · J light · K heavy · Space dodge · Q/E cards · R shuffle</span><span class="pill" id="status">Loading...</span></div></section><div class="touch"><button data-a="light">Light</button><button data-a="heavy">Heavy</button><button data-a="dodge">Dodge</button><button data-a="leftCard">LB</button><button data-a="rightCard">RB</button><button data-a="shuffle">Shuffle</button></div><script>
const cv=document.getElementById('c'),x=cv.getContext('2d'),$=id=>document.getElementById(id),TAU=Math.PI*2;
let W=0,H=0,D=1,last=performance.now(),wave=1,kills=0,spawn=0,over=false,msgT=0;
function resize(){D=Math.max(1,Math.min(2.5,devicePixelRatio||1));W=innerWidth;H=innerHeight;cv.width=W*D;cv.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',resize,{passive:true});resize();
const cl=(v,a,b)=>Math.max(a,Math.min(b,v)),di=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),no=(a,b)=>{let d=Math.hypot(a,b)||1;return{x:a/d,y:b/d}},ad=(a,b)=>Math.atan2(Math.sin(a-b),Math.cos(a-b)),rr=(a,b)=>a+Math.random()*(b-a);
const inp={down:new Set,press:new Set,mx:0,my:0,ax:1,ay:0,gp:null};
const km={KeyW:'up',ArrowUp:'up',KeyS:'down',ArrowDown:'down',KeyA:'left',ArrowLeft:'left',KeyD:'right',ArrowRight:'right',KeyJ:'light',KeyK:'heavy',Space:'dodge',KeyQ:'leftCard',KeyE:'rightCard',KeyR:'shuffle',Enter:'light'};
addEventListener('keydown',e=>{let a=km[e.code];if(a){if(!inp.down.has(a))inp.press.add(a);inp.down.add(a);e.preventDefault()}});addEventListener('keyup',e=>{let a=km[e.code];if(a){inp.down.delete(a);e.preventDefault()}});
document.querySelectorAll('button').forEach(b=>{let a=b.dataset.a;b.onpointerdown=e=>{e.preventDefault();inp.down.add(a);inp.press.add(a)};b.onpointerup=b.onpointercancel=b.onpointerleave=e=>{e.preventDefault();inp.down.delete(a)}});
addEventListener('gamepadconnected',e=>inp.gp=e.gamepad.index);addEventListener('gamepaddisconnected',e=>{if(inp.gp===e.gamepad.index)inp.gp=null});const pb=[['light',2],['heavy',3],['dodge',0],['shuffle',1],['leftCard',4],['rightCard',5]],prev={};
function input(){let mx=(inp.down.has('right')?1:0)-(inp.down.has('left')?1:0),my=(inp.down.has('down')?1:0)-(inp.down.has('up')?1:0),ax=inp.ax,ay=inp.ay;for(const g of navigator.getGamepads?navigator.getGamepads():[]){if(!g||inp.gp!==null&&g.index!==inp.gp)continue;let lx=Math.abs(g.axes[0])>.15?g.axes[0]:0,ly=Math.abs(g.axes[1])>.15?g.axes[1]:0,rx=Math.abs(g.axes[2])>.18?g.axes[2]:0,ry=Math.abs(g.axes[3])>.18?g.axes[3]:0;if(Math.hypot(lx,ly)){mx=lx;my=ly}if(Math.hypot(rx,ry)){ax=rx;ay=ry}for(const[p,i]of pb){let d=!!g.buttons[i]?.pressed;if(d&&!prev[p])inp.press.add(p);d?inp.down.add(p):inp.down.delete(p);prev[p]=d}break}let m=no(mx,my),mag=cl(Math.hypot(mx,my),0,1);inp.mx=m.x*mag;inp.my=m.y*mag;if(Math.hypot(ax,ay)<.1&&mag>.1){ax=inp.mx;ay=inp.my}let a=no(ax,ay);if(Math.hypot(ax,ay)>.1){inp.ax=a.x;inp.ay=a.y}}
const p={x:W/2,y:H*.58,r:16,hp:100,hpm:100,mp:3,mpm:3,regen:.55,spd:245,face:0,inv:0,dash:0,dc:0,dx:1,dy:0,ac:0,win:0,combo:0,flash:0},es=[],fx=[],float=[];
function say(t){$('status').textContent=t;msgT=2.5}function ring(x,y,r,type,life){fx.push({type:'ring',x,y,r,kind:type,life,max:life})}function line(x1,y1,x2,y2,life){fx.push({type:'line',x1,y1,x2,y2,life,max:life})}function text(t,x,y){float.push({t,x,y,life:.7,max:.7})}
function hurt(e,d,px,py,k=100){e.hp-=d;e.flash=.12;let n=no(e.x-px,e.y-py);e.x+=n.x*k*.025;e.y+=n.y*k*.025;text(Math.round(d),e.x,e.y-e.r);if(e.hp<=0){kills++;es.splice(es.indexOf(e),1);p.mp=cl(p.mp+.12,0,p.mpm)}}
function arc(range,wid,dmg,k,label){ring(p.x+Math.cos(p.face)*range*.45,p.y+Math.sin(p.face)*range*.45,range*.55,'slash',.13);let hits=0;for(const e of es.slice()){let dx=e.x-p.x,dy=e.y-p.y,d=Math.hypot(dx,dy),a=Math.atan2(dy,dx);if(d<=range+e.r&&Math.abs(ad(a,p.face))<=wid/2){hits++;hurt(e,dmg,p.x,p.y,k)}}if(hits)say(label+': hit '+hits)}
function light(){if(over||p.ac>0||deck.t>0)return;p.combo=p.win>0?(p.combo+1)%3:0;p.win=.62;let i=p.combo;p.ac=[.22,.25,.34][i];arc([76,82,92][i],[Math.PI*.68,Math.PI*.78,Math.PI*.50][i],[20,25,30][i],i===2?260:130,['Strike','Chop','Thrust'][i])}
function heavy(){if(over||p.ac>0||deck.t>0)return;p.ac=.72;p.win=0;p.combo=0;p.inv=Math.max(p.inv,.08);ring(p.x,p.y,112,'nova',.24);let h=0;for(const e of es.slice())if(di(p,e)<=116+e.r){h++;hurt(e,50,p.x,p.y,315)}if(h)say('Nova Smash: hit '+h)}
function dodge(){if(over||p.dc>0||p.dash>0)return;let dx=Math.abs(inp.mx)+Math.abs(inp.my)>.1?inp.mx:Math.cos(p.face),dy=Math.abs(inp.mx)+Math.abs(inp.my)>.1?inp.my:Math.sin(p.face),n=no(dx,dy);p.dx=n.x;p.dy=n.y;p.dash=.18;p.dc=.55;p.inv=.25;fx.push({type:'after',x:p.x,y:p.y,face:p.face,life:.28,max:.28})}
const cards=[{title:'Ground Stomp',src:'Diablo III / Barbarian',cost:1,desc:'Nearby stun pulse.',cast(){ring(p.x,p.y,120,'stun',.35);for(const e of es)if(di(p,e)<=126){e.stun=Math.max(e.stun,2);hurt(e,10,p.x,p.y,180)}say('Ground Stomp: nearby enemies stunned')}},{title:'Vault',src:'Diablo III / Demon Hunter',cost:.8,desc:'Acrobatic tumble forward.',cast(){p.dash=.24;p.inv=Math.max(p.inv,.32);p.dx=Math.cos(p.face);p.dy=Math.sin(p.face);fx.push({type:'after',x:p.x,y:p.y,face:p.face,life:.28,max:.28});say('Vault: long evasive tumble')}},{title:'Frost Nova',src:'Diablo III / Wizard',cost:1.2,desc:'Ice explosion freezes nearby enemies.',cast(){ring(p.x,p.y,150,'freeze',.42);for(const e of es)if(di(p,e)<=154){e.freeze=Math.max(e.freeze,2);hurt(e,8,p.x,p.y,115)}say('Frost Nova: nearby enemies frozen')}},{title:'Cleave',src:'Diablo III / Barbarian',cost:.6,desc:'Wide arc weapon swing.',cast(){arc(95,Math.PI*.95,24,260,'Cleave')}},{title:'Ancient Spear',src:'Diablo III / Barbarian',cost:1,desc:'Piercing spear line forward.',cast(){let fxv=Math.cos(p.face),fyv=Math.sin(p.face);line(p.x,p.y,p.x+fxv*340,p.y+fyv*340,.22);for(const e of es){let dx=e.x-p.x,dy=e.y-p.y,f=dx*fxv+dy*fyv,s=Math.abs(dx*fyv-dy*fxv);if(f>0&&f<340&&s<e.r+13)hurt(e,32,p.x,p.y,180)}say('Ancient Spear: piercing line')}},{title:'Caltrops',src:'Diablo III / Demon Hunter',cost:.8,desc:'Trap field that slows enemies.',cast(){fx.push({type:'caltrops',x:p.x,y:p.y,r:92,life:6,max:6});say('Caltrops: slow trap placed')}}];
const deck={draw:[],disc:[],a:[null,null],t:0,dur:1.15,n:0};function shuf(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function one(){return deck.draw.shift()||null}function initDeck(){deck.draw=shuf(cards.slice());deck.a=[one(),one()]}function cast(i){if(over||deck.t>0)return;let c=deck.a[i];if(!c){startShuffle();return}if(p.mp<c.cost){say('Not enough mana for '+c.title);return}p.mp-=c.cost;c.cast();deck.disc.push(c);deck.a[i]=one();if(!deck.a[0]&&!deck.a[1])startShuffle()}function startShuffle(){if(deck.t>0)return;for(let i=0;i<2;i++){if(deck.a[i])deck.disc.push(deck.a[i]);deck.a[i]=null}deck.n++;deck.dur=cl(.95+deck.n*.12,.95,1.85);deck.t=deck.dur;say('Shuffling / reloading deck...')}function finishShuffle(){deck.draw=shuf(deck.draw.concat(deck.disc));deck.disc=[];deck.a=[one(),one()];say('Tray reloaded')}initDeck();
function spawnE(kind=Math.random()<.22?'brute':'chaser'){let s=Math.floor(Math.random()*4),m=40,e={r:kind==='brute'?19:14,hp:kind==='brute'?72:38,hpm:kind==='brute'?72:38,spd:kind==='brute'?72:105,stun:0,freeze:0,slow:0,flash:0,kind};if(s===0){e.x=rr(m,W-m);e.y=-m}else if(s===1){e.x=W+m;e.y=rr(m,H-m)}else if(s===2){e.x=rr(m,W-m);e.y=H+m}else{e.x=-m;e.y=rr(m,H-m)}es.push(e)}for(let i=0;i<7;i++)spawnE(i%5?'chaser':'brute');
function actions(){if(inp.press.has('light'))light();if(inp.press.has('heavy'))heavy();if(inp.press.has('dodge'))dodge();if(inp.press.has('leftCard'))cast(0);if(inp.press.has('rightCard'))cast(1);if(inp.press.has('shuffle'))startShuffle();inp.press.clear()}
function upd(dt){p.face=Math.atan2(inp.ay,inp.ax);p.mp=cl(p.mp+p.regen*dt,0,p.mpm);p.inv=Math.max(0,p.inv-dt);p.dc=Math.max(0,p.dc-dt);p.ac=Math.max(0,p.ac-dt);p.win=Math.max(0,p.win-dt);p.flash=Math.max(0,p.flash-dt);let vx=inp.mx*p.spd,vy=inp.my*p.spd;if(p.dash>0){p.dash-=dt;vx=p.dx*720;vy=p.dy*720}p.x=cl(p.x+vx*dt,28,W-28);p.y=cl(p.y+vy*dt,28,H-28);spawn-=dt;if(spawn<=0&&es.length<8+wave*2){spawnE();spawn=cl(2.2-wave*.07,.9,2.2)}if(kills>=wave*10){wave++;say('Wave '+wave+': more enemies')}for(const e of es){e.stun=Math.max(0,e.stun-dt);e.freeze=Math.max(0,e.freeze-dt);e.slow=Math.max(0,e.slow-dt);e.flash=Math.max(0,e.flash-dt);for(const f of fx)if(f.type==='caltrops'&&di(e,f)<=f.r+e.r)e.slow=Math.max(e.slow,.25);if(e.stun||e.freeze)continue;let n=no(p.x-e.x,p.y-e.y),sm=e.slow?.38:1;e.x+=n.x*e.spd*sm*dt;e.y+=n.y*e.spd*sm*dt;if(di(p,e)<p.r+e.r&&p.inv<=0){p.hp-=e.kind==='brute'?14:8;p.flash=.18;p.inv=.45;let a=no(p.x-e.x,p.y-e.y);p.x=cl(p.x+a.x*18,28,W-28);p.y=cl(p.y+a.y*18,28,H-28);if(p.hp<=0){p.hp=0;over=true;say('Downed. Refresh to restart.')}}}for(let i=fx.length-1;i>=0;i--){fx[i].life-=dt;if(fx[i].life<=0)fx.splice(i,1)}for(let i=float.length-1;i>=0;i--){float[i].life-=dt;float[i].y-=24*dt;if(float[i].life<=0)float.splice(i,1)}if(deck.t>0){deck.t-=dt;if(deck.t<=0){deck.t=0;finishShuffle()}}if(msgT>0){msgT-=dt;if(msgT<=0)$('status').textContent='Wave '+wave+' · Kills '+kills+' · '+(inp.gp===null?'No gamepad locked yet':'Gamepad active')}}
function draw(){x.clearRect(0,0,W,H);x.save();x.globalAlpha=.22;x.strokeStyle='#fff';for(let gx=W%64;gx<W;gx+=64){x.beginPath();x.moveTo(gx,0);x.lineTo(gx,H);x.stroke()}for(let gy=H%64;gy<H;gy+=64){x.beginPath();x.moveTo(0,gy);x.lineTo(W,gy);x.stroke()}x.restore();for(const f of fx){let t=cl(f.life/f.max,0,1);x.save();if(f.type==='ring'){x.globalAlpha=t;x.strokeStyle=f.kind==='freeze'?'#98dbff':f.kind==='stun'?'#ffd66e':f.kind==='nova'?'#fff1a8':'#f4f6fb';x.lineWidth=f.kind==='slash'?11:4;x.beginPath();x.arc(f.x,f.y,f.r*(1.05-t*.35),0,TAU);x.stroke()}else if(f.type==='line'){x.globalAlpha=t;x.strokeStyle='#f8f0d2';x.lineWidth=5;x.beginPath();x.moveTo(f.x1,f.y1);x.lineTo(f.x2,f.y2);x.stroke()}else if(f.type==='after'){x.translate(f.x,f.y);x.rotate(f.face);x.globalAlpha=t*.36;x.fillStyle='#cdd8ff';x.beginPath();x.moveTo(20,0);x.lineTo(-12,-14);x.lineTo(-7,0);x.lineTo(-12,14);x.closePath();x.fill()}else if(f.type==='caltrops'){x.globalAlpha=.12+t*.15;x.fillStyle='#c5b7ff';x.beginPath();x.arc(f.x,f.y,f.r,0,TAU);x.fill();x.globalAlpha=.5;x.strokeStyle='#dcd4ff';x.lineWidth=2;x.beginPath();x.arc(f.x,f.y,f.r,0,TAU);x.stroke()}x.restore()}for(const e of es){x.save();x.translate(e.x,e.y);x.fillStyle=e.freeze?'#9ed8ff':e.stun?'#f7d46b':e.flash?'#fff':e.kind==='brute'?'#d96b6b':'#ff8f72';x.strokeStyle='#1d0f0d';x.lineWidth=3;x.beginPath();x.arc(0,0,e.r,0,TAU);x.fill();x.stroke();x.fillStyle='#0008';x.fillRect(-e.r,-e.r-10,e.r*2,4);x.fillStyle='#f4f6fb';x.fillRect(-e.r,-e.r-10,e.r*2*cl(e.hp/e.hpm,0,1),4);x.restore()}x.save();x.translate(p.x,p.y);x.rotate(p.face);x.globalAlpha=p.inv?.72:1;x.fillStyle=p.flash?'#fff':'#cdd8ff';x.strokeStyle='#0a1024';x.lineWidth=3;x.beginPath();x.moveTo(20,0);x.lineTo(-12,-14);x.lineTo(-7,0);x.lineTo(-12,14);x.closePath();x.fill();x.stroke();x.restore();x.save();x.font='700 13px system-ui';x.textAlign='center';for(const f of float){x.globalAlpha=cl(f.life/f.max,0,1);x.fillStyle='#fff';x.fillText(f.t,f.x,f.y)}x.restore();if(over){x.fillStyle='#0009';x.fillRect(0,0,W,H);x.fillStyle='#fff';x.font='800 42px system-ui';x.textAlign='center';x.fillText('DOWNED',W/2,H/2);x.font='600 16px system-ui';x.fillText('Refresh to restart',W/2,H/2+36)}}
function hud(){hp.style.width=p.hp/p.hpm*100+'%';hp.style.background='#fa6d6d';hpt.textContent=Math.ceil(p.hp)+' / '+p.hpm;mp.style.width=p.mp/p.mpm*100+'%';mp.style.background='#77a9ff';mpt.textContent=p.mp.toFixed(1)+' / '+p.mpm;let s=deck.t?1-deck.t/deck.dur:1;sh.style.width=s*100+'%';sh.style.background='#f6c667';sht.textContent=deck.t?deck.t.toFixed(1)+'s':'Ready';card($('l'),deck.a[0],!deck.a[0]||deck.t);card($('r'),deck.a[1],!deck.a[1]||deck.t)}
function card(el,c,off){el.classList.toggle('off',!!off);el.querySelector('h2').textContent=c?c.title:(deck.t?'Shuffling...':'Empty');el.querySelector('p').textContent=c?c.desc:'Press Circle/R to reload.';el.querySelector('small').textContent=c?c.src+' · Mana '+c.cost:'OSFE-style slot refill'}
function frame(now){let dt=cl((now-last)/1000,0,.033);last=now;input();actions();if(!over)upd(dt);draw();hud();requestAnimationFrame(frame)}say('Move with left stick. Square light, Triangle heavy, LB/RB cards, Circle shuffle.');requestAnimationFrame(frame);
